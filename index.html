                if (!undoToast) return;
                clearTimeout(undoToast.timer);
                setTransactions(prev => [...prev, ...undoToast.txsToRestore]);
                setUndoToast(null);
            };

            const _saveRef = React.useRef(null);
            useEffect(() => {
                if (_saveRef.current) clearTimeout(_saveRef.current);
                _saveRef.current = setTimeout(() => {
                    const prefix = `finance_${currentUser}_`;
                    localStorage.setItem(prefix + 'banks', JSON.stringify(banks));
                    localStorage.setItem(prefix + 'transactions', JSON.stringify(transactions));
                    localStorage.setItem(prefix + 'recurring', JSON.stringify(recurringTransactions));
                    localStorage.setItem(prefix + 'creditCards', JSON.stringify(creditCards));
                    localStorage.setItem(prefix + 'creditTransactions', JSON.stringify(creditTransactions));
                    localStorage.setItem(prefix + 'recurringCredit', JSON.stringify(recurringCredit));
                    if (window._fbReady && window._fbDocRef) {
                        window._fbDocRef.set({ banks, transactions, recurringTransactions, creditCards, creditTransactions, recurringCredit }, { merge: true })
                            .catch(e => console.error('Firebase save error:', e));
                    }
                }, 1000);
            }, [banks, transactions, recurringTransactions, creditCards, creditTransactions, recurringCredit]);

            // טעינה מ-Firebase בעת עליית האפליקציה
            useEffect(() => {
                if (!window._fbReady || !window._fbDocRef) return;
                window._fbDocRef = firebase.firestore().collection('finance').doc(currentUser);
                window._fbDocRef.get().then(snap => {
                    if (snap.exists) {
                        const data = snap.data();
                        if (data.banks?.length) setBanks(data.banks);
                        if (data.transactions?.length) setTransactions(data.transactions);
                        if (data.recurringTransactions?.length) setRecurringTransactions(data.recurringTransactions);
                        if (data.creditCards?.length) setCreditCards(data.creditCards);
                        if (data.creditTransactions?.length) setCreditTransactions(data.creditTransactions);
                        if (data.recurringCredit?.length) setRecurringCredit(data.recurringCredit);
                    } else {
                        setBanks(defaultBanks);
                        setTransactions([]);
                        setRecurringTransactions([]);
                        setCreditCards([]);
                        setCreditTransactions([]);
                        setRecurringCredit([]);
                    }
                }).catch(e => console.error('Firebase load error:', e));
            }, [currentUser]);

            useEffect(() => {
                fetch('https://api.exchangerate-api.com/v4/latest/USD')
                    .then(res => res.json())
                    .then(data => { if (data.rates && data.rates.ILS) { setUsdRate(data.rates.ILS.toFixed(2)); setUsdUpdateTime(new Date().toLocaleString('he-IL', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' })); } })
                    .catch(() => {});
            }, []);

            // PWA install prompt
            useEffect(() => {
                const handler = (e) => { e.preventDefault(); setDeferredPrompt(e); setShowPwaInstall(true); };
                window.addEventListener('beforeinstallprompt', handler);
                return () => window.removeEventListener('beforeinstallprompt', handler);
            }, []);

            const handlePwaInstall = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                setDeferredPrompt(null);
                setShowPwaInstall(false);
            };

            const onTouchStart = (e) => { setTouchEnd(null); setTouchStart(e.targetTouches[0].clientX); };
            const onTouchMove = (e) => { setTouchEnd(e.targetTouches[0].clientX); };
            const onTouchEnd = () => { if (!touchStart || !touchEnd) return; const distance = touchStart - touchEnd; if (distance > 50) changeMonth(-1); if (distance < -50) changeMonth(1); };
            const changeMonth = (delta) => { const newDate = new Date(currentDate); newDate.setMonth(newDate.getMonth() + delta); setCurrentDate(newDate); };

            const allTransactions = useMemo(() => {
                // תנועות רגילות + חוזרות
                const regular = [...transactions, ...recurringTransactions.flatMap(r => generateRecurringInstances(r))];
                // תנועות אוטומטיות של חיוב אשראי — מסתכמות ביום החיוב
                const creditCharges = creditCards.flatMap(card => {
                    // כל החיובים הידניים + הקבועים של הכרטיס
                    const cardTxs = creditTransactions.filter(t => t.cardId === card.id);
                    const cardRecurring = recurringCredit
                        .filter(r => r.cardId === card.id)
                        .flatMap(r => generateRecurringInstances({ ...r, bankId: card.bankId }));
                    // קבץ לפי חודש וצור תנועה אחת ביום החיוב
                    const byMonth = {};
                    [...cardTxs, ...cardRecurring].forEach(t => {
                        const [y, m] = t.date.split('-');
                        const key = `${y}-${m}`;
                        if (!byMonth[key]) byMonth[key] = [];
                        byMonth[key].push(t);
                    });
                    return Object.entries(byMonth).map(([ym, txs]) => {
                        const [y, m] = ym.split('-');
                        const chargeDay = clampDayToMonth(card.chargeDay, parseInt(y), parseInt(m) - 1);
                        const chargeDate = `${y}-${m}-${String(chargeDay).padStart(2,'0')}`;
                        const total = txs.reduce((s, t) => s + t.amount, 0);
                        const today = getDateKey(new Date());
                        const isPending = chargeDate > today;
                        return { id: `credit-charge-${card.id}-${ym}`, date: chargeDate, bankId: card.bankId, amount: total, description: `💳 חיוב ${card.name}`, isRecurring: false, isCreditCharge: true, isPending, cardId: card.id, cardTxs: txs };
                    });
                });
                return [...regular, ...creditCharges];
            }, [transactions, recurringTransactions, creditCards, creditTransactions, recurringCredit]);

            // allTransactions filtered by pending toggle — used for calendar display only
            const displayTransactions = useMemo(() =>
                showPending ? allTransactions : allTransactions.filter(t => !t.isPending),
            [allTransactions, showPending]);

            const calendarData = useMemo(() => {
                const year = currentDate.getFullYear(), month = currentDate.getMonth();
                const firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push({ isEmpty: true, key: `empty-${i}` });
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateKey = getDateKey(new Date(year, month, day));
                    const bankBalances = banks.map(bank => ({ bankId: bank.id, balance: bank.initialBalance + displayTransactions.filter(t => t.bankId === bank.id && t.date <= dateKey).reduce((s, t) => s + t.amount, 0) }));
                    const totalBalance = bankBalances.reduce((sum, b) => sum + b.balance, 0);
                    const displayBalance = selectedBankFilter === 'all' ? totalBalance : bankBalances.find(b => b.bankId === selectedBankFilter)?.balance || 0;
                    const hasPending = transactions.some(t => t.date === dateKey && t.isPending);
                    // חישוב סטטוס לפי מסגרת
                    const status = selectedBankFilter === 'all'
                        ? getBalanceStatus(bankBalances, banks)
                        : (() => {
                            const bank = banks.find(b => b.id === selectedBankFilter);
                            const bal = bankBalances.find(b => b.bankId === selectedBankFilter)?.balance || 0;
                            if (bal >= 0) return 'positive';
                            const limit = bank?.creditLimit || 0;
                            if (limit > 0 && Math.abs(bal) <= limit) return 'within_limit';
                            return 'over_limit';
                        })();
                    days.push({ day, dateKey, balance: displayBalance, balanceStatus: status, hasTransactions: transactions.some(t => t.date === dateKey && !t.isPending), hasRecurring: allTransactions.some(t => t.date === dateKey && t.isRecurring), hasPending, isToday: dateKey === getDateKey(new Date()), key: dateKey });
                }
                return days;
            }, [currentDate, banks, displayTransactions, allTransactions, transactions, selectedBankFilter]);

            const exportData = () => { const blob = new Blob([JSON.stringify({ banks, transactions, recurringTransactions })], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `finance_backup_${getDateKey(new Date())}.json`; a.click(); };
            const importData = (e) => { const reader = new FileReader(); reader.onload = (evt) => { const data = JSON.parse(evt.target.result); if (confirm('זה יחליף את כל הנתונים הקיימים. להמשיך?')) { setBanks(data.banks); setTransactions(data.transactions); setRecurringTransactions(data.recurringTransactions); } }; reader.readAsText(e.target.files[0]); };
            const addRecurring = (data) => { setRecurringTransactions([...recurringTransactions, { ...data, id: Date.now().toString() }]); setShowAddRecurring(false); };
            const editRecurring = (id, data) => { setRecurringTransactions(recurringTransactions.map(r => r.id === id ? { ...r, ...data } : r)); };
            const deleteRecurring = (id) => { const r = recurringTransactions.find(r => r.id === id); if (confirm(`למחוק את "${r.description}"?`)) { setRecurringTransactions(recurringTransactions.filter(rt => rt.id !== id)); if(confirm("למחוק גם היסטוריה?")) setTransactions(transactions.filter(t => t.recurringId !== id)); } };

            // Check if currently viewing current month (to show "today" hint)
            const isCurrentMonth = currentDate.getFullYear() === new Date().getFullYear() && currentDate.getMonth() === new Date().getMonth();

            return (
                <div className="max-w-7xl mx-auto p-4 sm:p-8">
                    <h1 className="text-3xl font-bold text-gray-800 mb-6 text-center flex items-center justify-center gap-2">
                        <span className="text-4xl animate-bounce">💰</span>
                        <span className="bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">מנהל הכספים שלי</span>
                    </h1>
                    {currentUser && (
                        <div className="flex justify-center mb-4">
                            <div className="flex items-center gap-3 bg-white border border-gray-200 rounded-xl px-4 py-2 shadow-sm text-sm">
                                <span className="text-gray-500">👤 <span className="font-bold text-gray-700">{currentUser}</span></span>
                                <button onClick={onLogout} className="text-red-500 hover:text-red-700 font-bold border-r pr-3 mr-1">התנתק</button>
                            </div>
                        </div>
                    )}

                    {/* NEW: PWA Install button */}
                    {showPwaInstall && (
                        <div className="mb-4 flex justify-center">
                            <button onClick={handlePwaInstall} className="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold shadow-md hover:bg-blue-700 flex items-center gap-2 animate-pulse">
                                📲 התקן כאפליקציה על המכשיר
                            </button>
                        </div>
                    )}

                    <div className="bg-white rounded-3xl shadow-xl overflow-hidden border-2 mb-12">
                        {/* FIX: corrected arrow directions — ➡ = next month (newer), ⬅ = previous month (older) */}
                        <div className="bg-blue-600 p-6 flex justify-between items-center text-white">
                            {/* RIGHT arrow = go to next month (newer / later) */}
                            <button onClick={() => changeMonth(1)} className="text-2xl bg-white/20 hover:bg-white/40 w-10 h-10 rounded-xl transition-colors" title="חודש הבא">➡</button>
                            <div className="text-center">
                                <h2 className="text-xl sm:text-3xl font-black">{currentDate.toLocaleDateString('he-IL', { month: 'long', year: 'numeric' })}</h2>
                                {/* NEW: show "today" label only when not in current month */}
                                {!isCurrentMonth && (
                                    <button onClick={() => setCurrentDate(new Date())} className="text-[10px] bg-white/20 px-3 py-1 rounded-full mt-2 hover:bg-white/30">🏠 חזור להיום</button>
                                )}
                                {isCurrentMonth && (
                                    <div className="text-[10px] bg-white/10 px-3 py-1 rounded-full mt-2 inline-block">📍 חודש נוכחי</div>
                                )}
                            </div>
                            {/* LEFT arrow = go to previous month (older / earlier) */}
                            <button onClick={() => changeMonth(-1)} className="text-2xl bg-white/20 hover:bg-white/40 w-10 h-10 rounded-xl transition-colors" title="חודש קודם">⬅</button>
                        </div>

                        <div className="bg-gray-50 px-4 py-4 border-b flex flex-wrap items-center justify-center gap-3">
                            <span className="text-sm font-bold text-gray-500">👀 תצוגת חשבון:</span>
                            <select value={selectedBankFilter} onChange={(e) => setSelectedBankFilter(e.target.value)} className="bg-white border-2 border-gray-200 rounded-xl px-4 py-2 text-sm font-bold outline-none focus:border-blue-500 shadow-sm">
                                <option value="all">💎 כל החשבונות</option>
                                {banks.map(bank => <option key={bank.id} value={bank.id}>🏦 {bank.name}</option>)}
                            </select>
                            <button onClick={() => setShowPending(!showPending)} className={`px-4 py-2 rounded-xl text-sm font-bold border-2 transition-all ${showPending ? 'bg-orange-50 border-orange-300 text-orange-700' : 'bg-white border-gray-200 text-gray-400'}`} title="הצג/הסתר תנועות מתוכננות">
                                🕐 {showPending ? 'כולל מתוכנן' : 'בפועל בלבד'}
                            </button>
                            <button onClick={() => setShowGlobalSearch(true)} className="bg-white border-2 border-gray-200 rounded-xl px-3 py-2 text-sm font-bold hover:border-blue-400 transition-all" title="חיפוש גלובלי">🔍</button>
                            <button onClick={() => setShowCalculator(!showCalculator)} className={`bg-white border-2 rounded-xl px-3 py-2 text-sm font-bold transition-all ${showCalculator ? 'border-blue-400 bg-blue-50' : 'border-gray-200 hover:border-blue-400'}`} title="מחשבון">🧮</button>
                        </div>

                        {/* NEW: Monthly summary strip */}
                        <MonthlySummary allTransactions={allTransactions} currentDate={currentDate} banks={banks} selectedBankFilter={selectedBankFilter} showPending={showPending} />

                        <div className="grid grid-cols-7 bg-gray-100 border-b text-center font-black py-4 text-gray-400 text-xs">
                            {['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'].map(d => <div key={d} className="hidden sm:block">{d}</div>)}
                            {['א','ב','ג','ד','ה','ו','ש'].map(d => <div key={d} className="sm:hidden">{d}</div>)}
                        </div>
                        <div className="grid grid-cols-7" onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
                            {calendarData.map(d => <DayCell key={d.key} {...d} onClick={() => !d.isEmpty && setSelectedDate(d.dateKey)} />)}
                        </div>
                    </div>

                    <div className="pt-8 border-t-4 border-gray-100">
                        <h2 className="text-2xl font-black text-gray-800 mb-8 text-center flex items-center justify-center gap-2"><span>⚙️</span> הגדרות וניהול</h2>
                        <div className="mb-10">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="text-xl font-bold flex items-center gap-2">🏦 ניהול חשבונות בנק</h3>
                                <button onClick={() => setBanks([...banks, { id: Date.now().toString(), name: 'חשבון חדש', color: '#6366f1', initialBalance: 0 }])} className="bg-blue-600 text-white px-5 py-2 rounded-xl font-bold shadow-md hover:bg-blue-700">➕ הוסף חשבון</button>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">{banks.map(b => <BankCard key={b.id} bank={b} onUpdate={(id, f, v) => setBanks(banks.map(bk => bk.id === id ? {...bk, [f]: v} : bk))} onDelete={id => setBanks(banks.filter(bk => bk.id !== id))} canDelete={banks.length > 1} />)}</div>
                        </div>
                        <div className="mb-10">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="text-xl font-bold flex items-center gap-2">🔄 תנועות חוזרות (קבועות)</h3>
                                <button onClick={() => setShowAddRecurring(!showAddRecurring)} className={`px-5 py-2 rounded-xl font-bold shadow-md transition-all ${showAddRecurring ? 'bg-gray-500 text-white' : 'bg-purple-600 text-white hover:bg-purple-700'}`}>{showAddRecurring ? '✕ ביטול' : '+ הוסף תנועה חוזרת'}</button>
                            </div>
                            {showAddRecurring && <div className="mb-6"><RecurringForm banks={banks} onSave={addRecurring} onCancel={() => setShowAddRecurring(false)} /></div>}
                            {recurringTransactions.length === 0 ? <div className="bg-purple-50 border-2 border-dashed border-purple-200 rounded-3xl p-10 text-center"><div className="text-5xl mb-4">🔄</div><p className="text-purple-800 font-bold mb-1 text-lg">אין תנועות חוזרות מוגדרות</p></div> : <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">{recurringTransactions.map(r => <RecurringCard key={r.id} recurring={r} banks={banks} onEdit={editRecurring} onDelete={deleteRecurring} />)}</div>}
                        </div>
                        
                        <div className="flex flex-col sm:flex-row gap-3 justify-center py-6 border-t border-dashed border-gray-200">
                            <button onClick={exportData} className="bg-gradient-to-r from-gray-700 to-gray-800 text-white px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2 shadow-md text-sm"><span>💾</span> גיבוי נתונים</button>
                            <label className="bg-white text-gray-700 border-2 border-gray-200 px-6 py-3 rounded-xl font-bold cursor-pointer text-center flex items-center justify-center gap-2 shadow-sm text-sm"><span>📂</span> שחזור נתונים<input type="file" onChange={importData} className="hidden" /></label>
                        </div>

                        {/* ייבוא דף חשבון CSV */}
                        <CsvImportSection banks={banks} onImport={(newTxs) => setTransactions(prev => [...prev, ...newTxs])} />
                    </div>

                    {/* אזור כרטיסי אשראי */}
                    <CreditCardsSection
                        creditCards={creditCards}
                        setCreditCards={setCreditCards}
                        creditTransactions={creditTransactions}
                        setCreditTransactions={setCreditTransactions}
                        recurringCredit={recurringCredit}
                        setRecurringCredit={setRecurringCredit}
                        banks={banks}
                        currentDate={currentDate}
                    />

                    <div className="max-w-7xl mx-auto px-4 sm:px-8">
                        <PasswordSection />
                        {usdRate && <div className="text-center pb-6 space-y-4"><div className="inline-flex items-center gap-2 bg-gradient-to-r from-green-50 to-emerald-50 px-5 py-2.5 rounded-xl border border-green-200 shadow-sm"><span>💵</span><span className="text-sm font-medium text-gray-600">שער:</span><span className="font-bold text-green-700">$1 = ₪{usdRate}</span></div><br/><CurrencyConverter usdRate={usdRate} /></div>}
                    </div>
                    {selectedDate && <TransactionModal date={selectedDate} banks={banks} allTransactions={allTransactions} onClose={() => setSelectedDate(null)} onAddTransaction={t => setTransactions([...transactions, t])} onUpdateTransaction={updatedTx => setTransactions(transactions.map(t => t.id === updatedTx.id ? updatedTx : t))} onDeleteTransaction={(id) => { const transaction = transactions.find(t => t.id === id); if (transaction?.transferId) { if (confirm('למחוק העברה?')) { const transferTxs = transactions.filter(t => t.transferId === transaction.transferId); showUndo('העברה נמחקה', transferTxs); setTransactions(transactions.filter(t => t.transferId !== transaction.transferId)); } } else { showUndo('תנועה נמחקה', [transaction]); setTransactions(transactions.filter(tx => tx.id !== id)); } }} onAddTransfer={(fromBankId, toBankId, amount, description) => { const transferId = `transfer-${Date.now()}`; const common = { date: selectedDate, isRecurring: false, transferId }; setTransactions([...transactions, { ...common, id: `${transferId}-out`, bankId: fromBankId, amount: -Math.abs(amount), description: description || '🔄 העברה', transferTo: toBankId }, { ...common, id: `${transferId}-in`, bankId: toBankId, amount: Math.abs(amount), description: description || '🔄 העברה', transferFrom: fromBankId }]); }} />}

                    {/* CALCULATOR */}
                    {showCalculator && <Calculator onClose={() => setShowCalculator(false)} />}

                    {/* GLOBAL SEARCH MODAL */}
                    {showGlobalSearch && (
                        <GlobalSearchModal
                            transactions={allTransactions}
                            banks={banks}
                            onClose={() => setShowGlobalSearch(false)}
                            onSelectDate={(date) => { setShowGlobalSearch(false); setSelectedDate(date); setCurrentDate(new Date(date)); }}
                        />
                    )}

                    {/* UNDO TOAST */}
                    {undoToast && (
                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex items-center gap-3 bg-gray-800 text-white px-5 py-3 rounded-2xl shadow-2xl animate-fadeIn">
                            <span className="text-sm font-medium">{undoToast.label}</span>
                            <button onClick={handleUndo} className="bg-white text-gray-800 px-3 py-1 rounded-lg text-sm font-black hover:bg-gray-100">בטל</button>
                        </div>
                    )}
                </div>
            );
        };

        // --- פאנל מנהל ---
        const AdminPanel = ({ onClose }) => {
            const [adminPass, setAdminPass] = useState('');
            const [authed, setAuthed] = useState(false);
            const [users, setUsers] = useState([]);
            const [error, setError] = useState('');
            const [resetUser, setResetUser] = useState(null);
            const [newPass, setNewPass] = useState('');
            const ADMIN_HASH_KEY = 'finance_admin_password';

            const handleAdminLogin = async (e) => {
                e.preventDefault();
                const savedHash = localStorage.getItem(ADMIN_HASH_KEY);
                if (!savedHash) {
                    // הגדרת סיסמת מנהל בפעם הראשונה
                    if (adminPass.length < 4) { setError('סיסמה חייבת להיות לפחות 4 תווים'); return; }
                    const hashed = await hashPassword(adminPass);
                    localStorage.setItem(ADMIN_HASH_KEY, hashed);
                    setAuthed(true); loadUsers();
                } else {
                    const hashed = await hashPassword(adminPass);
                    if (hashed === savedHash) { setAuthed(true); loadUsers(); }
                    else setError('סיסמת מנהל שגויה');
                }
            };

            const loadUsers = async () => {
                if (!window._fbReady) return;
                const snap = await firebase.firestore().collection('users').get();
                setUsers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
            };

            const deleteUser = async (userId) => {
                if (!confirm(`למחוק את המשתמש "${userId}"?`)) return;
                await firebase.firestore().collection('users').doc(userId).delete();
                await firebase.firestore().collection('finance').doc(userId).delete();
                loadUsers();
            };

            const resetPassword = async (userId) => {
                if (!newPass || newPass.length < 4) { alert('סיסמה חייבת להיות לפחות 4 תווים'); return; }
                const hashed = await hashPassword(newPass);
                await firebase.firestore().collection('users').doc(userId).update({ password: hashed });
                setResetUser(null); setNewPass('');
                alert('הסיסמה אופסה בהצלחה');
            };

            return (
                <>
                    <div className="backdrop-animate fixed inset-0 bg-black/50 z-40" onClick={onClose}></div>
                    <div className="modal-animate fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white rounded-3xl shadow-2xl w-[95%] max-w-md z-50 overflow-hidden flex flex-col max-h-[85vh]">
                        <div className="bg-gray-800 p-5 text-white flex justify-between items-center">
                            <h2 className="text-xl font-bold">🛡️ פאנל מנהל</h2>
                            <button onClick={onClose} className="bg-white/20 hover:bg-white/40 w-8 h-8 rounded-full flex items-center justify-center">✕</button>
                        </div>
                        <div className="p-5 overflow-y-auto">
                            {!authed ? (
                                <form onSubmit={handleAdminLogin} className="space-y-3">
                                    <p className="text-sm text-gray-500 text-center">
                                        {localStorage.getItem(ADMIN_HASH_KEY) ? 'הזן סיסמת מנהל' : '🔑 הגדר סיסמת מנהל בפעם הראשונה'}
                                    </p>
                                    <input type="password" value={adminPass} onChange={e => { setAdminPass(e.target.value); setError(''); }} placeholder="סיסמת מנהל" className="w-full p-3 border-2 rounded-xl outline-none focus:border-gray-500" autoFocus />
                                    {error && <p className="text-red-500 text-sm font-bold text-center">{error}</p>}
                                    <button type="submit" className="w-full bg-gray-800 text-white py-3 rounded-xl font-bold hover:bg-gray-900">כניסה</button>
                                </form>
                            ) : (
                                <div className="space-y-3">
                                    <p className="text-sm text-gray-500 font-bold">{users.length} משתמשים רשומים:</p>
                                    {users.length === 0 && <p className="text-center text-gray-400 py-4">אין משתמשים עדיין</p>}
                                    {users.map(u => (
                                        <div key={u.id} className="bg-gray-50 rounded-xl p-3 border flex justify-between items-center">
                                            <span className="font-bold text-gray-800">👤 {u.id}</span>
                                            <div className="flex gap-2">
                                                <button onClick={() => setResetUser(u.id)} className="text-xs bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg font-bold hover:bg-blue-100">🔑 אפס סיסמה</button>
                                                <button onClick={() => deleteUser(u.id)} className="text-xs bg-red-50 text-red-600 px-3 py-1.5 rounded-lg font-bold hover:bg-red-100">🗑️ מחק</button>
                                            </div>
                                        </div>
                                    ))}
                                    {resetUser && (
                                        <div className="bg-blue-50 rounded-xl p-3 border-2 border-blue-200 space-y-2">
                                            <p className="text-sm font-bold text-blue-800">איפוס סיסמה ל-{resetUser}:</p>
                                            <input type="password" value={newPass} onChange={e => setNewPass(e.target.value)} placeholder="סיסמה חדשה" className="w-full p-2 border rounded-lg text-sm outline-none" />
                                            <div className="flex gap-2">
                                                <button onClick={() => resetPassword(resetUser)} className="flex-1 bg-blue-600 text-white py-2 rounded-lg text-sm font-bold">שמור</button>
                                                <button onClick={() => { setResetUser(null); setNewPass(''); }} className="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg text-sm font-bold">ביטול</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </>
            );
        };

        // --- מערכת משתמשים ---
        const AuthScreen = ({ onLogin }) => {
            const [mode, setMode] = useState('login'); // 'login' | 'register'
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [confirmPassword, setConfirmPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            const [logoClicks, setLogoClicks] = useState(0);
            const [showAdmin, setShowAdmin] = useState(false);
            const logoClickTimeout = React.useRef(null);

            const usersRef = window._fbReady ? firebase.firestore().collection('users') : null;

            // 3 לחיצות על הלוגו → פאנל מנהל
            const handleLogoClick = () => {
                const newCount = logoClicks + 1;
                setLogoClicks(newCount);
                if (logoClickTimeout.current) clearTimeout(logoClickTimeout.current);
                if (newCount >= 3) { setShowAdmin(true); setLogoClicks(0); return; }
                logoClickTimeout.current = setTimeout(() => setLogoClicks(0), 1500);
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                if (!username.trim() || !password) { setError('יש למלא שם משתמש וסיסמה'); return; }
                setLoading(true); setError('');
                try {
                    const snap = await usersRef.doc(username.trim().toLowerCase()).get();
                    if (!snap.exists) { setError('שם משתמש לא קיים'); setLoading(false); return; }
                    const hashed = await hashPassword(password);
                    if (snap.data().password !== hashed) { setError('סיסמה שגויה'); setLoading(false); return; }
                    localStorage.setItem('finance_current_user', username.trim().toLowerCase());
                    onLogin(username.trim().toLowerCase());
                } catch(e) { setError('שגיאה בחיבור, נסה שוב'); }
                setLoading(false);
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                if (!username.trim() || !password) { setError('יש למלא שם משתמש וסיסמה'); return; }
                if (username.trim().length < 3) { setError('שם משתמש חייב להיות לפחות 3 תווים'); return; }
                if (password.length < 4) { setError('סיסמה חייבת להיות לפחות 4 תווים'); return; }
                if (password !== confirmPassword) { setError('הסיסמאות אינן תואמות'); return; }
                setLoading(true); setError('');
                try {
                    const userKey = username.trim().toLowerCase();
                    const snap = await usersRef.doc(userKey).get();
                    if (snap.exists) { setError('שם משתמש כבר תפוס'); setLoading(false); return; }
                    const hashed = await hashPassword(password);
                    await usersRef.doc(userKey).set({ username: userKey, password: hashed, createdAt: new Date().toISOString() });
                    localStorage.setItem('finance_current_user', userKey);
                    onLogin(userKey);
                } catch(e) { setError('שגיאה ביצירת חשבון, נסה שוב'); }
                setLoading(false);
            };

            return (
                <div className="fixed inset-0 bg-gradient-to-br from-blue-600 to-purple-700 flex items-center justify-center p-4">
                    {showAdmin && <AdminPanel onClose={() => setShowAdmin(false)} />}
                    <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm">
                        <div className="text-center mb-6">
                            <div className="text-5xl mb-2 cursor-pointer select-none inline-block" onClick={handleLogoClick}>💰</div>
                            <h2 className="text-2xl font-black text-gray-800">מנהל הכספים</h2>
                            <p className="text-gray-400 text-sm mt-1">{mode === 'login' ? 'כניסה לחשבון' : 'יצירת חשבון חדש'}</p>
                        </div>
                        <form onSubmit={mode === 'login' ? handleLogin : handleRegister} className="space-y-3">
                            <input
                                type="text"
                                value={username}
                                onChange={e => { setUsername(e.target.value); setError(''); }}
                                placeholder="👤 שם משתמש"
                                className="w-full p-3 border-2 rounded-xl outline-none focus:border-blue-500 text-right"
                                autoFocus
                            />
                            <input
                                type="password"
                                value={password}
                                onChange={e => { setPassword(e.target.value); setError(''); }}
                                placeholder="🔑 סיסמה"
                                className="w-full p-3 border-2 rounded-xl outline-none focus:border-blue-500 text-right"
                            />
                            {mode === 'register' && (
                                <input
                                    type="password"
                                    value={confirmPassword}
                                    onChange={e => { setConfirmPassword(e.target.value); setError(''); }}
                                    placeholder="🔑 אמת סיסמה"
                                    className="w-full p-3 border-2 rounded-xl outline-none focus:border-blue-500 text-right"
                                />
                            )}
                            {error && <p className="text-red-500 text-sm font-bold text-center">{error}</p>}
                            <button type="submit" disabled={loading} className="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-lg hover:bg-blue-700 transition-colors shadow-lg disabled:opacity-70">
                                {loading ? '⏳ רגע...' : mode === 'login' ? 'כניסה' : 'הרשמה'}
                            </button>
                        </form>
                        <button onClick={() => { setMode(mode === 'login' ? 'register' : 'login'); setError(''); }} className="w-full mt-4 text-sm text-blue-600 font-bold hover:underline text-center">
                            {mode === 'login' ? 'אין לך חשבון? הירשם כאן' : 'יש לך חשבון? התחבר'}
                        </button>
                    </div>
                </div>
            );
        };

        const AppRoot = () => {
            const [currentUser, setCurrentUser] = useState(() => localStorage.getItem('finance_current_user') || null);

            const handleLogin = (username) => {
                // עדכן את נתיב Firebase לפי המשתמש
                if (window._fbReady) {
                    window._fbDocRef = firebase.firestore().collection('finance').doc(username);
                }
                setCurrentUser(username);
            };

            const handleLogout = () => {
                localStorage.removeItem('finance_current_user');
                // נקה את Firebase ref
                if (window._fbReady) {
                    window._fbDocRef = null;
                }
                setCurrentUser(null);
            };

            // אם כבר מחובר — עדכן את נתיב Firebase
            useEffect(() => {
                if (currentUser && window._fbReady) {
                    window._fbDocRef = firebase.firestore().collection('finance').doc(currentUser);
                }
            }, [currentUser]);

            if (!currentUser) return <AuthScreen onLogin={handleLogin} />;
            return <FinanceApp currentUser={currentUser} onLogout={handleLogout} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppRoot />);
    </script>

    <script>
        const manifestData = {
            name: "מנהל הכספים שלי",
            short_name: "מנהל כספים",
            description: "ניהול חכם של חשבונות ותנועות פיננסיות",
            start_url: window.location.pathname,
            display: "standalone",
            background_color: "#ffffff",
            theme_color: "#3b82f6",
            orientation: "portrait",
            dir: "rtl",
            lang: "he",
            icons: [{ src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>💰</text></svg>", sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }]
        };
        const manifestBlob = new Blob([JSON.stringify(manifestData)], { type: 'application/json' });
        const manifestURL = URL.createObjectURL(manifestBlob);
        document.getElementById('manifest-placeholder').setAttribute('href', manifestURL);
    </script>
</body>
</html>
