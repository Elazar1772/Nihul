<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- SHA-256 helper for password hashing ---
        const hashPassword = async (password) => {
            const msgBuffer = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        };

        // --- פונקציות עזר קיימות ---
        const formatCurrency = (amount) => new Intl.NumberFormat('he-IL', { style: 'currency', currency: 'ILS', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(amount);
        const formatCurrencyCompact = (amount) => Math.abs(amount) >= 10000 ? (amount / 1000).toFixed(1) + 'K ₪' : formatCurrency(amount);
        const formatDate = (dateStr) => { const [year, month, day] = dateStr.split('-'); return `${day}/${month}/${year}`; };
        const getDateKey = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;

        // FIX: clamp dayOfMonth to actual days in month to avoid day-31 disappearing
        const clampDayToMonth = (dayOfMonth, year, month) => {
            const maxDay = new Date(year, month + 1, 0).getDate();
            return Math.min(dayOfMonth, maxDay);
        };

        const generateRecurringInstances = (recurring, monthsAhead = 12) => {
            const instances = [];
            const startDate = new Date(recurring.startDate);
            const endDate = recurring.endDate ? new Date(recurring.endDate) : null;
            const limitDate = new Date(); limitDate.setMonth(limitDate.getMonth() + monthsAhead);

            let year = startDate.getFullYear();
            let month = startDate.getMonth();

            // Start from the correct month
            while (true) {
                const clampedDay = clampDayToMonth(recurring.dayOfMonth, year, month);
                const currentDate = new Date(year, month, clampedDay);
                if (currentDate > limitDate) break;
                if (currentDate >= startDate && (!endDate || currentDate <= endDate)) {
                    instances.push({
                        id: `recurring-${recurring.id}-${getDateKey(currentDate)}`,
                        date: getDateKey(currentDate),
                        bankId: recurring.bankId,
                        amount: recurring.amount,
                        description: recurring.description,
                        type: recurring.type,
                        isRecurring: true
                    });
                }
                month++;
                if (month > 11) { month = 0; year++; }
            }
            return instances;
        };

        // --- רכיבים קיימים ללא שינוי ---
        const BankCard = ({ bank, onUpdate, onDelete, canDelete }) => (
            <div className="bank-card bg-white rounded-xl p-5 shadow-md border-2 border-gray-100 hover:border-blue-200">
                <div className="flex items-center gap-2 mb-3">
                    <span className="text-2xl">🏦</span>
                    <input type="text" value={bank.name} onChange={(e) => onUpdate(bank.id, 'name', e.target.value)} className="flex-1 font-semibold text-gray-800 outline-none bg-transparent" />
                </div>
                <div className="mb-3">
                    <label className="text-xs text-gray-500 mb-1 block">💰 יתרה התחלתית</label>
                    <input type="number" value={bank.initialBalance} onChange={(e) => onUpdate(bank.id, 'initialBalance', Number(e.target.value))} className="w-full bg-gray-50 rounded-lg px-3 py-2 border border-gray-200 font-mono" />
                </div>
                <div className="mb-4">
                    <label className="text-xs text-gray-500 mb-1 block">🔴 מסגרת אשראי (0 = אין מסגרת)</label>
                    <input type="number" value={bank.creditLimit || 0} onChange={(e) => onUpdate(bank.id, 'creditLimit', Number(e.target.value))} className="w-full bg-gray-50 rounded-lg px-3 py-2 border border-gray-200 font-mono" min="0" />
                </div>
                <div className="flex items-center justify-between pt-3 border-t">
                    <div className="flex items-center gap-2">
                        <span className="text-xs text-gray-400">🎨 צבע:</span>
                        <input type="color" value={bank.color} onChange={(e) => onUpdate(bank.id, 'color', e.target.value)} className="w-8 h-8 rounded-lg cursor-pointer" />
                    </div>
                    {canDelete && <button onClick={() => onDelete(bank.id)} className="text-red-500 hover:scale-110 transition-transform" title="מחק חשבון">🗑️</button>}
                </div>
            </div>
        );

        const RecurringCard = ({ recurring, banks, onEdit, onDelete }) => {
            const [isEditing, setIsEditing] = useState(false);
            if (isEditing) return <RecurringForm recurring={recurring} banks={banks} onSave={(data) => { onEdit(recurring.id, data); setIsEditing(false); }} onCancel={() => setIsEditing(false)} />;
            return (
                <div className="recurring-card bg-white rounded-xl p-4 shadow-md border-2 border-gray-100">
                    <div className="flex justify-between mb-3">
                        <h4 className="font-semibold text-gray-800">{recurring.description}</h4>
                        <span className={`font-bold ${recurring.amount >= 0 ? 'text-green-700' : 'text-red-600'}`}>{formatCurrency(recurring.amount)}</span>
                    </div>
                    <div className="text-xs text-gray-500 mb-3 space-y-1">
                        <div>📅 יום {recurring.dayOfMonth} לחודש</div>
                        <div>⏱️ מ-{formatDate(recurring.startDate)}{recurring.endDate ? ` עד ${formatDate(recurring.endDate)}` : ''}</div>
                        <div>💳 {banks.find(b => b.id === recurring.bankId)?.name}</div>
                    </div>
                    <div className="flex gap-2">
                        <button onClick={() => setIsEditing(true)} className="flex-1 bg-blue-50 text-blue-600 py-2 rounded-lg text-sm font-medium hover:bg-blue-100">✏️ עריכה</button>
                        <button onClick={() => onDelete(recurring.id)} className="flex-1 bg-red-50 text-red-600 py-2 rounded-lg text-sm font-medium hover:bg-red-100">🗑️ מחיקה</button>
                    </div>
                </div>
            );
        };

        const RecurringForm = ({ recurring, banks, onSave, onCancel }) => {
            const [formData, setFormData] = useState({
                bankId: recurring?.bankId || banks[0]?.id || '',
                description: recurring?.description || '',
                amount: recurring ? Math.abs(recurring.amount).toString() : '',
                type: recurring?.type || 'expense',
                dayOfMonth: recurring?.dayOfMonth || 1,
                startDate: recurring?.startDate || getDateKey(new Date()),
                endDate: recurring?.endDate || ''
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.description.trim()) { alert('יש להזין תיאור'); return; }
                if (!formData.amount || Number(formData.amount) <= 0) { alert('יש להזין סכום חיובי'); return; }
                const finalAmount = formData.type === 'expense' ? -Math.abs(Number(formData.amount)) : Math.abs(Number(formData.amount));
                onSave({ bankId: formData.bankId, description: formData.description.trim(), amount: finalAmount, type: formData.type, dayOfMonth: Number(formData.dayOfMonth), startDate: formData.startDate, endDate: formData.endDate || null });
            };

            return (
                <form onSubmit={handleSubmit} className="bg-purple-50 rounded-xl p-4 border-2 border-purple-200 space-y-3">
                    <h4 className="font-bold text-gray-800">{recurring ? '✏️ עריכת תנועה חוזרת' : '➕ תנועה חוזרת חדשה'}</h4>
                    <div className="flex gap-2">
                        <button type="button" onClick={() => setFormData({...formData, type: 'income'})} className={`flex-1 py-2 rounded-lg font-medium ${formData.type === 'income' ? 'bg-green-600 text-white shadow-md' : 'bg-white text-gray-600 border'}`}>💰 הכנסה</button>
                        <button type="button" onClick={() => setFormData({...formData, type: 'expense'})} className={`flex-1 py-2 rounded-lg font-medium ${formData.type === 'expense' ? 'bg-red-600 text-white shadow-md' : 'bg-white text-gray-600 border'}`}>💸 הוצאה</button>
                    </div>
                    <select value={formData.bankId} onChange={(e) => setFormData({...formData, bankId: e.target.value})} className="w-full p-2 border rounded-lg text-sm bg-white">
                        {banks.map(b => <option key={b.id} value={b.id}>💳 {b.name}</option>)}
                    </select>
                    <input type="text" value={formData.description} onChange={(e) => setFormData({...formData, description: e.target.value})} placeholder="✍️ תיאור" className="w-full p-2 border rounded-lg text-sm" />
                    <div className="flex gap-2">
                        <input type="number" value={formData.amount} onChange={(e) => setFormData({...formData, amount: e.target.value})} placeholder="₪ סכום" className="flex-1 p-2 border rounded-lg text-sm font-mono" step="0.01" />
                        <input type="number" value={formData.dayOfMonth} onChange={(e) => setFormData({...formData, dayOfMonth: e.target.value})} placeholder="יום" min="1" max="28" className="w-20 p-2 border rounded-lg text-sm text-center font-bold" title="יום 1-28 (למניעת בעיות בחודשים קצרים)" />
                    </div>
                    <p className="text-xs text-gray-400">⚠️ מומלץ עד יום 28 כדי להבטיח שהתנועה תופיע בכל החודשים</p>
                    <div className="grid grid-cols-2 gap-2">
                        <div><label className="text-xs text-gray-600 block mb-1">📅 מתאריך</label><input type="date" value={formData.startDate} onChange={(e) => setFormData({...formData, startDate: e.target.value})} className="w-full p-2 border rounded-lg text-sm" /></div>
                        <div><label className="text-xs text-gray-600 block mb-1">🏁 עד תאריך</label><input type="date" value={formData.endDate} onChange={(e) => setFormData({...formData, endDate: e.target.value})} className="w-full p-2 border rounded-lg text-sm" /></div>
                    </div>
                    <div className="flex gap-2">
                        <button type="submit" className="flex-1 bg-purple-600 text-white py-2 rounded-lg font-semibold text-sm hover:bg-purple-700 shadow-sm">✅ שמור</button>
                        {onCancel && <button type="button" onClick={onCancel} className="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg font-semibold text-sm hover:bg-gray-300">❌ ביטול</button>}
                    </div>
                </form>
            );
        };

        const CurrencyConverter = ({ usdRate }) => {
            const [usdAmount, setUsdAmount] = useState('');
            const [ilsAmount, setIlsAmount] = useState('');
            const handleUsdChange = (v) => { setUsdAmount(v); if(v && !isNaN(v)) setIlsAmount((parseFloat(v) * usdRate).toFixed(2)); else setIlsAmount(''); };
            const handleIlsChange = (v) => { setIlsAmount(v); if(v && !isNaN(v)) setUsdAmount((parseFloat(v) / usdRate).toFixed(2)); else setUsdAmount(''); };
            return (
                <div className="inline-flex items-center gap-3 bg-white px-4 py-2 rounded-xl border border-gray-200 shadow-sm">
                    <div className="flex items-center gap-2"><span>💵</span><input type="number" value={usdAmount} onChange={e => handleUsdChange(e.target.value)} placeholder="USD" className="w-20 px-2 py-1 text-sm border rounded bg-blue-50 text-center font-mono outline-none" /></div>
                    <span className="text-gray-400">⇄</span>
                    <div className="flex items-center gap-2"><span>₪</span><input type="number" value={ilsAmount} onChange={e => handleIlsChange(e.target.value)} placeholder="ILS" className="w-20 px-2 py-1 text-sm border rounded bg-green-50 text-center font-mono outline-none" /></div>
                </div>
            );
        };

        // פונקציית עזר לצבע לפי יתרה ומסגרת
        // status: 'positive' | 'within_limit' | 'over_limit'
        const getBalanceStatus = (bankBalances, banks) => {
            let hasOverLimit = false;
            let hasWithinLimit = false;
            for (const bb of bankBalances) {
                const bank = banks.find(b => b.id === bb.bankId);
                const limit = bank?.creditLimit || 0;
                if (bb.balance < 0) {
                    if (limit > 0 && Math.abs(bb.balance) <= limit) hasWithinLimit = true;
                    else hasOverLimit = true;
                }
            }
            if (hasOverLimit) return 'over_limit';
            if (hasWithinLimit) return 'within_limit';
            return 'positive';
        };

        const balanceColorClass = (status) => {
            if (status === 'over_limit') return 'text-red-600';
            if (status === 'within_limit') return 'text-orange-500';
            return 'text-green-700';
        };

        const balanceBgClass = (status) => {
            if (status === 'over_limit') return 'negative-balance';
            if (status === 'within_limit') return 'negative-balance';
            return 'positive-balance';
        };

        const DayCell = ({ day, balance, balanceStatus, hasTransactions, hasRecurring, hasPending, isToday, isEmpty, onClick }) => {
            if (isEmpty) return <div className="min-h-[100px] bg-gray-50 border border-gray-100"></div>;
            return (
                <div onClick={onClick} className={`day-cell min-h-[120px] p-3 border border-gray-200 cursor-pointer flex flex-col ${balanceBgClass(balanceStatus)} ${isToday ? '!bg-blue-50 border-2 !border-blue-400 shadow-inner' : ''} ${hasPending ? 'has-pending' : ''}`}>
                    <div className="flex justify-between items-start mb-2">
                        <span className={`day-num text-sm font-semibold ${isToday ? 'text-blue-700' : 'text-gray-700'}`}>
                            {day}
                            {isToday && <span className="mr-1 text-[9px] bg-blue-600 text-white px-1 py-0.5 rounded-full align-middle">היום</span>}
                        </span>
                        <div className="flex gap-1">
                            {hasTransactions && <div className="w-2 h-2 bg-green-500 rounded-full"></div>}
                            {hasRecurring && <div className="w-2 h-2 bg-purple-500 rounded-full"></div>}
                            {hasPending && <div className="w-2 h-2 bg-orange-400 rounded-full" title="יש תנועות מתוכננות"></div>}
                        </div>
                    </div>
                    <div className="flex-1 flex items-center justify-center font-bold text-sm">
                        <span className={`day-amount ${balanceColorClass(balanceStatus)}`}>{formatCurrencyCompact(balance)}</span>
                    </div>
                    {hasPending && <div className="text-[9px] text-orange-400 text-center font-medium">מתוכנן</div>}
                </div>
            );
        };

        // Modal for monthly drill-down (income or expense list)
        const MonthlyDrillModal = ({ type, transactions, banks, currentDate, onClose }) => {
            const label = type === 'income' ? '💰 הכנסות החודש' : '💸 הוצאות החודש';
            const sorted = [...transactions].sort((a, b) => a.date.localeCompare(b.date));
            const total = sorted.reduce((s, t) => s + t.amount, 0);
            return (
                <>
                    <div className="backdrop-animate fixed inset-0 bg-black/40 backdrop-blur-sm z-40" onClick={onClose}></div>
                    <div className="modal-animate fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white rounded-3xl shadow-2xl w-[95%] max-w-lg z-50 overflow-hidden flex flex-col max-h-[85vh]">
                        <div className={`p-5 text-white flex justify-between items-center ${type === 'income' ? 'bg-green-600' : 'bg-red-500'}`}>
                            <h2 className="text-xl font-bold">{label}</h2>
                            <button onClick={onClose} className="bg-white/20 hover:bg-white/40 w-8 h-8 rounded-full flex items-center justify-center">✕</button>
                        </div>
                        <div className="p-4 overflow-y-auto space-y-2">
                            {sorted.length === 0
                                ? <div className="text-center py-10 text-gray-400 italic">אין תנועות</div>
                                : sorted.map(tx => (
                                    <div key={tx.id} className="flex justify-between items-center p-3 bg-gray-50 rounded-xl border">
                                        <div>
                                            <div className="font-semibold text-gray-800">{tx.description}</div>
                                            <div className="text-xs text-gray-400">{formatDate(tx.date)} · {banks.find(b => b.id === tx.bankId)?.name}</div>
                                        </div>
                                        <span className={`font-bold font-mono ${type === 'income' ? 'text-green-600' : 'text-red-500'}`}>{formatCurrency(Math.abs(tx.amount))}</span>
                                    </div>
                                ))
                            }
                        </div>
                        <div className={`px-5 py-3 border-t flex justify-between font-black text-lg ${type === 'income' ? 'text-green-700' : 'text-red-600'}`}>
                            <span>סה"כ</span>
                            <span className="font-mono">{formatCurrency(Math.abs(total))}</span>
                        </div>
                    </div>
                </>
            );
        };

        // NEW: Monthly summary bar — cells are clickable for income/expense drill-down
        const MonthlySummary = ({ allTransactions, currentDate, banks, selectedBankFilter, showPending }) => {
            const [drillType, setDrillType] = useState(null); // 'income' | 'expense' | null

            const year = currentDate.getFullYear(), month = currentDate.getMonth();
            const monthStart = `${year}-${String(month + 1).padStart(2,'0')}-01`;
            const monthEnd = `${year}-${String(month + 1).padStart(2,'0')}-${String(new Date(year, month+1, 0).getDate()).padStart(2,'0')}`;

            const monthTxs = allTransactions.filter(t => {
                if (t.date < monthStart || t.date > monthEnd) return false;
                if (selectedBankFilter !== 'all' && t.bankId !== selectedBankFilter) return false;
                if (!showPending && t.isPending) return false;
                return true;
            });

            // drill-down always shows only actual (non-pending) transactions
            const actualTxs = monthTxs.filter(t => !t.isPending);

            const incomeTxs = actualTxs.filter(t => t.amount > 0);
            const expenseTxs = actualTxs.filter(t => t.amount < 0);
            const income = monthTxs.filter(t => t.amount > 0).reduce((s,t) => s + t.amount, 0);
            const expenses = monthTxs.filter(t => t.amount < 0).reduce((s,t) => s + t.amount, 0);
            const balance = income + expenses;

            return (
                <>
                    <div className="bg-white border-b px-4 py-3 grid grid-cols-3 gap-2 text-center text-sm">
                        <button onClick={() => setDrillType('income')} className="rounded-xl py-1 hover:bg-green-50 transition-colors cursor-pointer">
                            <div className="text-xs text-gray-400 mb-0.5">💰 הכנסות</div>
                            <div className="font-bold text-green-600 underline decoration-dotted">{formatCurrencyCompact(income)}</div>
                        </button>
                        <button onClick={() => setDrillType('expense')} className="rounded-xl py-1 hover:bg-red-50 transition-colors cursor-pointer">
                            <div className="text-xs text-gray-400 mb-0.5">💸 הוצאות</div>
                            <div className="font-bold text-red-500 underline decoration-dotted">{formatCurrencyCompact(expenses)}</div>
                        </button>
                        <div className="py-1">
                            <div className="text-xs text-gray-400 mb-0.5">📊 מאזן</div>
                            <div className={`font-bold ${balance > 0 ? 'text-blue-600' : balance === 0 ? 'text-gray-600' : 'text-red-600'}`}>{formatCurrencyCompact(balance)}</div>
                        </div>
                    </div>
                    {drillType && (
                        <MonthlyDrillModal
                            type={drillType}
                            transactions={drillType === 'income' ? incomeTxs : expenseTxs}
                            banks={banks}
                            currentDate={currentDate}
                            onClose={() => setDrillType(null)}
                        />
                    )}
                </>
            );
        };

        const CreditChargeTxRow = ({ tx, banks }) => {
            const [expanded, setExpanded] = useState(false);
            return (
                <div className={`p-3 rounded-xl border-2 ${tx.isPending ? 'bg-orange-50 border-orange-200' : 'bg-indigo-50 border-indigo-100'}`}>
                    <div className="flex justify-between items-center cursor-pointer" onClick={() => setExpanded(!expanded)}>
                        <div className="flex-1">
                            <div className="flex items-center gap-2">
                                <span className="text-lg">💳</span>
                                <span className={`font-semibold ${tx.isPending ? 'text-orange-700 italic' : 'text-gray-800'}`}>{tx.description}</span>
                                {tx.isPending && <span className="text-[9px] bg-orange-200 text-orange-700 px-1.5 py-0.5 rounded-full font-bold">מתוכנן</span>}
                                <span className="text-[9px] text-indigo-400">{expanded ? '▲' : '▼'} {tx.cardTxs?.length || 0} פריטים</span>
                            </div>
                            <div className="text-[10px] text-gray-400 mr-7">{banks.find(b => b.id === tx.bankId)?.name}</div>
                        </div>
                        <span className={`font-bold font-mono ${tx.isPending ? 'text-orange-500' : tx.amount >= 0 ? 'text-green-600' : 'text-red-600'}`}>{formatCurrency(tx.amount)}</span>
                    </div>
                    {expanded && tx.cardTxs?.length > 0 && (
                        <div className="mt-2 mr-7 space-y-1 border-t border-indigo-200 pt-2">
                            {tx.cardTxs.map((ct, i) => (
                                <div key={i} className="flex justify-between text-xs text-indigo-700 bg-white rounded-lg px-2 py-1.5 border border-indigo-100">
                                    <span>{ct.description}</span>
                                    <span className="font-mono font-bold">{formatCurrency(ct.amount)}</span>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const TransactionModal = ({ date, banks, allTransactions, onClose, onAddTransaction, onDeleteTransaction, onAddTransfer, onUpdateTransaction }) => {
            const [selectedBank, setSelectedBank] = useState(banks[0]?.id || '');
            const [description, setDescription] = useState('');
            const [amount, setAmount] = useState('');
            const [type, setType] = useState('expense');
            const [isPending, setIsPending] = useState(false);
            const [activeTab, setActiveTab] = useState('add');
            const [editingId, setEditingId] = useState(null);
            const [fromBank, setFromBank] = useState(banks[0]?.id || '');
            const [toBank, setToBank] = useState(banks[1]?.id || banks[0]?.id);
            const [transferAmount, setTransferAmount] = useState('');
            const [transferDescription, setTransferDescription] = useState('🔄 העברה');
            const [searchQuery, setSearchQuery] = useState('');

            const dayTransactions = allTransactions.filter(t => t.date === date);
            const bankBalances = banks.map(bank => ({ ...bank, balance: bank.initialBalance + allTransactions.filter(t => t.bankId === bank.id && t.date <= date).reduce((sum, t) => sum + t.amount, 0) }));

            // FIX: disable transfer button when fromBank === toBank
            const transferInvalid = fromBank === toBank;

            const startEdit = (tx) => { setEditingId(tx.id); setDescription(tx.description); setAmount(Math.abs(tx.amount).toString()); setType(tx.amount >= 0 ? 'income' : 'expense'); setSelectedBank(tx.bankId); setIsPending(!!tx.isPending); setActiveTab('add'); };
            const resetForm = () => { setEditingId(null); setDescription(''); setAmount(''); setType('expense'); setIsPending(false); };

            // Filter transactions by search in the 'tx' tab
            const filteredDayTransactions = searchQuery.trim()
                ? dayTransactions.filter(t => t.description?.includes(searchQuery) || Math.abs(t.amount).toString().includes(searchQuery))
                : dayTransactions;

            return (
                <>
                    <div className="backdrop-animate fixed inset-0 bg-black/40 backdrop-blur-sm z-40" onClick={onClose}></div>
                    <div className="modal-animate fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white rounded-3xl shadow-2xl w-[95%] max-w-lg z-50 overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="bg-blue-600 p-5 text-white flex justify-between items-center"><h2 className="text-xl font-bold">📅 {formatDate(date)}</h2><button onClick={onClose} className="bg-white/20 hover:bg-white/40 w-8 h-8 rounded-full flex items-center justify-center">✕</button></div>
                        <div className="flex border-b text-center font-bold">
                            {[{id:'add',label: editingId ? '✏️ עריכה' : '➕ הוספה'},{id:'transfer',label:'🔄 העברה'},{id:'tx',label:'📝 תנועות'},{id:'bal',label:'💰 יתרות'}].map(tab => (
                                <button key={tab.id} onClick={() => { setActiveTab(tab.id); if(tab.id !== 'add') resetForm(); }} className={`flex-1 py-3 text-sm ${activeTab === tab.id ? 'border-b-4 border-blue-600 text-blue-600 bg-blue-50' : 'text-gray-500 hover:bg-gray-50'}`}>{tab.label}</button>
                            ))}
                        </div>
                        <div className="p-5 overflow-y-auto">
                            {activeTab === 'add' && (
                                <form className="space-y-4" onSubmit={e => { e.preventDefault(); const txData = { id: editingId || Date.now().toString(), date, bankId: selectedBank, amount: type === 'expense' ? -Math.abs(Number(amount)) : Math.abs(Number(amount)), description, isRecurring: false, isPending }; if(editingId) onUpdateTransaction(txData); else onAddTransaction(txData); onClose(); }}>
                                    <div className="flex gap-2">
                                        <button type="button" onClick={() => setType('expense')} className={`flex-1 py-3 rounded-xl font-bold ${type === 'expense' ? 'bg-red-500 text-white shadow-lg' : 'bg-gray-100 text-gray-500'}`}>💸 הוצאה</button>
                                        <button type="button" onClick={() => setType('income')} className={`flex-1 py-3 rounded-xl font-bold ${type === 'income' ? 'bg-green-500 text-white shadow-lg' : 'bg-gray-100 text-gray-500'}`}>💰 הכנסה</button>
                                    </div>
                                    <input type="text" value={description} onChange={e => setDescription(e.target.value)} placeholder="✍️ תיאור" className="w-full p-3 border-2 rounded-xl outline-none" required />
                                    <input type="number" value={amount} onChange={e => setAmount(e.target.value)} placeholder="₪ סכום" className="w-full p-3 border-2 rounded-xl font-mono outline-none" required />
                                    <select value={selectedBank} onChange={e => setSelectedBank(e.target.value)} className="w-full p-3 border-2 rounded-xl bg-white">{banks.map(b => <option key={b.id} value={b.id}>🏦 {b.name}</option>)}</select>
                                    {/* NEW: pending toggle */}
                                    <button type="button" onClick={() => setIsPending(!isPending)} className={`w-full py-2 rounded-xl font-medium text-sm border-2 transition-all ${isPending ? 'bg-orange-50 border-orange-400 text-orange-700' : 'bg-gray-50 border-gray-200 text-gray-400'}`}>
                                        🕐 {isPending ? 'מתוכנן (טרם בוצע)' : 'סמן כמתוכנן'}
                                    </button>
                                    <div className="flex gap-2 pt-2">
                                        <button type="submit" className="flex-1 bg-blue-600 text-white py-4 rounded-xl font-bold text-lg shadow-md hover:bg-blue-700">✅ {editingId ? 'עדכן תנועה' : 'שמור תנועה'}</button>
                                        {editingId && <button type="button" onClick={resetForm} className="bg-gray-200 text-gray-700 px-6 rounded-xl">❌ בטל</button>}
                                    </div>
                                </form>
                            )}
                            {activeTab === 'transfer' && (
                                <form className="space-y-4" onSubmit={e => { e.preventDefault(); onAddTransfer(fromBank, toBank, Number(transferAmount), transferDescription); onClose(); }}>
                                    <div className="bg-purple-50 p-4 rounded-xl border-2 border-purple-200 space-y-3">
                                        <h4 className="font-bold text-center mb-4 text-purple-800">🔄 העברה בין חשבונות</h4>
                                        <div><label className="text-xs font-bold text-purple-600 block mb-1">📤 מחשבון</label><select value={fromBank} onChange={e => setFromBank(e.target.value)} className="w-full p-3 border-2 rounded-xl bg-white">{banks.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}</select></div>
                                        <div className="text-center text-2xl">⬇️</div>
                                        <div><label className="text-xs font-bold text-purple-600 block mb-1">📥 לחשבון</label><select value={toBank} onChange={e => setToBank(e.target.value)} className="w-full p-3 border-2 rounded-xl bg-white">{banks.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}</select></div>
                                        {/* FIX: show warning instead of alert when same bank selected */}
                                        {transferInvalid && <p className="text-red-500 text-sm font-bold text-center">⚠️ לא ניתן להעביר לאותו חשבון</p>}
                                        <div><label className="text-xs font-bold text-purple-600 block mb-1">₪ סכום העברה</label><input type="number" value={transferAmount} onChange={e => setTransferAmount(e.target.value)} placeholder="0.00" className="w-full p-3 border-2 rounded-xl font-mono" step="0.01" required /></div>
                                        <div><label className="text-xs font-bold text-purple-600 block mb-1">✍️ תיאור</label><input type="text" value={transferDescription} onChange={e => setTransferDescription(e.target.value)} placeholder="העברה" className="w-full p-3 border-2 rounded-xl" /></div>
                                    </div>
                                    {/* FIX: button disabled when same bank */}
                                    <button type="submit" disabled={transferInvalid} className={`w-full py-4 rounded-xl font-bold text-lg transition-all ${transferInvalid ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-purple-600 text-white hover:bg-purple-700'}`}>🚀 בצע העברה</button>
                                </form>
                            )}
                            {activeTab === 'tx' && (
                                <div className="space-y-3">
                                    {/* NEW: Search field in transactions tab */}
                                    <input
                                        type="text"
                                        value={searchQuery}
                                        onChange={e => setSearchQuery(e.target.value)}
                                        placeholder="🔍 חיפוש לפי תיאור או סכום..."
                                        className="w-full p-2 border-2 rounded-xl text-sm outline-none focus:border-blue-400"
                                    />
                                    {filteredDayTransactions.length === 0 ? <div className="text-center py-10 text-gray-400 italic">{searchQuery ? 'לא נמצאו תנועות' : 'אין תנועות ביום זה'}</div> : filteredDayTransactions.map(tx => {
                                        const isTransfer = !!tx.transferId;
                                        const isCreditCharge = !!tx.isCreditCharge;
                                        const linkedBank = isTransfer ? (tx.transferTo ? banks.find(b => b.id === tx.transferTo) : banks.find(b => b.id === tx.transferFrom)) : null;
                                        if (isCreditCharge) return <CreditChargeTxRow key={tx.id} tx={tx} banks={banks} />;
                                        return (
                                            <div key={tx.id} className={`p-3 rounded-xl border-2 ${tx.isPending ? 'bg-orange-50 border-orange-200' : isTransfer ? 'bg-purple-50 border-purple-100' : 'bg-gray-50 border-gray-100'}`}>
                                                <div className="flex justify-between items-center">
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-2">
                                                            <span className="text-lg">{tx.isPending ? '🕐' : isTransfer ? '🔄' : (tx.amount >= 0 ? '💰' : '💸')}</span>
                                                            <span className={`font-semibold ${tx.isPending ? 'text-orange-700 italic' : 'text-gray-800'}`}>{tx.description}</span>
                                                            {tx.isPending && <span className="text-[9px] bg-orange-200 text-orange-700 px-1.5 py-0.5 rounded-full font-bold">מתוכנן</span>}
                                                        </div>
                                                        {isTransfer && linkedBank && <div className="text-xs text-purple-600 font-medium mr-7">{tx.transferTo ? `⬅️ נשלח אל ${linkedBank.name}` : `➡️ התקבל מ-${linkedBank.name}`}</div>}
                                                        <div className="text-[10px] text-gray-400 mr-7">{banks.find(b => b.id === tx.bankId)?.name}</div>
                                                    </div>
                                                    <div className="flex gap-1 items-center">
                                                        <span className={`font-bold ml-2 ${tx.isPending ? 'text-orange-500' : tx.amount >= 0 ? 'text-green-600' : 'text-red-600'}`}>{formatCurrency(tx.amount)}</span>
                                                        {!tx.isRecurring && <div className="flex bg-white rounded-lg shadow-sm border overflow-hidden">
                                                            {tx.isPending && <button onClick={() => onUpdateTransaction({...tx, isPending: false})} className="p-2 hover:bg-green-50 text-green-600 text-xs font-bold border-r" title="סמן כבוצע">✓</button>}
                                                            {!isTransfer && <button onClick={() => startEdit(tx)} className="p-2 hover:bg-blue-50 text-blue-500">✏️</button>}
                                                            <button onClick={() => onDeleteTransaction(tx.id)} className="p-2 hover:bg-red-50 text-red-400 border-r">🗑️</button>
                                                        </div>}
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                            {activeTab === 'bal' && (
                                <div className="space-y-3 bg-gray-50 p-4 rounded-2xl border-2 border-gray-100">
                                    {bankBalances.map(b => {
                                        const bank = banks.find(bk => bk.id === b.id);
                                        const limit = bank?.creditLimit || 0;
                                        let color = 'text-green-600';
                                        if (b.balance < 0) {
                                            color = (limit > 0 && Math.abs(b.balance) <= limit) ? 'text-orange-500' : 'text-red-600';
                                        }
                                        return (
                                            <div key={b.id} className="flex justify-between items-center p-3 bg-white rounded-xl shadow-sm border">
                                                <div className="flex items-center gap-2">
                                                    <div className="w-3 h-3 rounded-full" style={{backgroundColor: b.color}}></div>
                                                    <span className="font-bold text-gray-700">{b.name}</span>
                                                    {limit > 0 && <span className="text-[10px] text-gray-400">מסגרת: {formatCurrency(limit)}</span>}
                                                </div>
                                                <span className={`font-mono font-bold ${color}`}>{formatCurrency(b.balance)}</span>
                                            </div>
                                        );
                                    })}
                                    <div className="pt-3 border-t-2 flex justify-between items-center px-3">
                                        <span className="font-black text-gray-900">סה"כ יתרה:</span>
                                        <span className={`font-mono font-black text-lg ${balanceColorClass(getBalanceStatus(bankBalances.map(b => ({bankId: b.id, balance: b.balance})), banks))}`}>{formatCurrency(bankBalances.reduce((s,b)=>s+b.balance,0))}</span>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </>
            );
        };

        // FIX: Password section uses SHA-256 hashing
        const PasswordSection = () => {
            const [isChanging, setIsChanging] = useState(false);
            const [newPass, setNewPass] = useState('');
            const [confirmPass, setConfirmPass] = useState('');
            const [mismatch, setMismatch] = useState(false);
            
            const handleSave = async () => {
                setMismatch(false);
                if (!newPass) {
                    if (confirm('מחיקת הסיסמה תהפוך את האפליקציה לחופשית לכל מי שיפתח אותה. להמשיך?')) {
                        localStorage.removeItem('finance_app_password');
                        alert('הסיסמה הוסרה');
                        setIsChanging(false);
                    }
                } else {
                    if (newPass !== confirmPass) { setMismatch(true); return; }
                    const hashed = await hashPassword(newPass);
                    localStorage.setItem('finance_app_password', hashed);
                    alert('הסיסמה עודכנה בהצלחה');
                    setIsChanging(false);
                    setNewPass('');
                    setConfirmPass('');
                }
            };

            return (
                <div className="mb-10 bg-white border-2 border-orange-100 rounded-3xl p-6 shadow-sm">
                    <h3 className="text-xl font-bold flex items-center gap-2 mb-4">🔐 אבטחת חשבון</h3>
                    {!isChanging ? (
                        <button onClick={() => setIsChanging(true)} className="bg-orange-50 text-orange-600 px-6 py-3 rounded-xl font-bold hover:bg-orange-100 transition-all flex items-center gap-2">
                            <span>🔑</span> הגדר / שנה סיסמת כניסה
                        </button>
                    ) : (
                        <div className="flex flex-col gap-3">
                            <input 
                                type="password" 
                                value={newPass} 
                                onChange={e => setNewPass(e.target.value)} 
                                placeholder="סיסמה חדשה (השאר ריק לביטול)" 
                                className="flex-1 p-3 border-2 rounded-xl outline-none focus:border-orange-400"
                            />
                            <input 
                                type="password" 
                                value={confirmPass} 
                                onChange={e => setConfirmPass(e.target.value)} 
                                placeholder="אמת סיסמה" 
                                className={`flex-1 p-3 border-2 rounded-xl outline-none ${mismatch ? 'border-red-400 bg-red-50' : 'focus:border-orange-400'}`}
                            />
                            {mismatch && <p className="text-red-500 text-sm font-bold">הסיסמאות אינן תואמות</p>}
                            <div className="flex gap-2">
                                <button onClick={handleSave} className="bg-orange-600 text-white px-6 py-3 rounded-xl font-bold">שמור</button>
                                <button onClick={() => { setIsChanging(false); setNewPass(''); setConfirmPass(''); setMismatch(false); }} className="bg-gray-100 text-gray-600 px-6 py-3 rounded-xl font-bold">ביטול</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- ייבוא CSV ---
        const CsvImportSection = ({ banks, onImport }) => {
            const [preview, setPreview] = useState(null); // [{date, description, amount}]
            const [selectedBank, setSelectedBank] = useState(banks[0]?.id || '');
            const [error, setError] = useState('');

            const parseCSV = (text) => {
                const lines = text.split('\n').filter(l => l.trim());
                const results = [];
                for (const line of lines) {
                    // נסה לפרש עמודות: תאריך, תיאור, סכום
                    const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                    if (cols.length < 2) continue;
                    // חפש תאריך בפורמט dd/mm/yyyy או yyyy-mm-dd
                    let date = null, description = '', amount = null;
                    for (const col of cols) {
                        if (!date && /^\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4}$/.test(col)) {
                            const parts = col.split(/[\/\-\.]/);
                            if (parts[2]?.length === 4) date = `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
                            else if (parts[0]?.length === 4) date = `${parts[0]}-${parts[1].padStart(2,'0')}-${parts[2].padStart(2,'0')}`;
                        } else if (!date && /^\d{4}-\d{2}-\d{2}$/.test(col)) {
                            date = col;
                        } else if (amount === null && /^-?[\d,]+\.?\d*$/.test(col.replace(/,/g,''))) {
                            amount = parseFloat(col.replace(/,/g,''));
                        } else if (!description && col.length > 1 && isNaN(col)) {
                            description = col;
                        }
                    }
                    if (date && amount !== null && description) results.push({ date, description, amount });
                }
                return results;
            };

            const handleFile = (e) => {
                setError('');
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const parsed = parseCSV(evt.target.result);
                    if (parsed.length === 0) { setError('לא נמצאו תנועות בקובץ. ודא שהקובץ בפורמט CSV עם עמודות: תאריך, תיאור, סכום'); return; }
                    setPreview(parsed);
                };
                reader.readAsText(file, 'UTF-8');
                e.target.value = '';
            };

            const handleImport = () => {
                const newTxs = preview.map(tx => ({ id: `csv-${Date.now()}-${Math.random()}`, date: tx.date, bankId: selectedBank, amount: tx.amount, description: tx.description, isRecurring: false }));
                onImport(newTxs);
                setPreview(null);
                alert(`יובאו ${newTxs.length} תנועות בהצלחה`);
            };

            return (
                <div className="mb-10 bg-white border-2 border-teal-100 rounded-3xl p-6 shadow-sm">
                    <h3 className="text-xl font-bold flex items-center gap-2 mb-2">📄 ייבוא דף חשבון</h3>
                    <p className="text-sm text-gray-400 mb-4">ייבוא תנועות מקובץ CSV שהורדת מהבנק</p>
                    {!preview ? (
                        <div className="flex flex-col sm:flex-row gap-3 items-start">
                            <select value={selectedBank} onChange={e => setSelectedBank(e.target.value)} className="p-3 border-2 rounded-xl bg-white text-sm font-bold outline-none">
                                {banks.map(b => <option key={b.id} value={b.id}>🏦 {b.name}</option>)}
                            </select>
                            <label className="bg-teal-50 text-teal-700 border-2 border-teal-200 px-6 py-3 rounded-xl font-bold cursor-pointer flex items-center gap-2 text-sm hover:bg-teal-100">
                                📂 בחר קובץ CSV
                                <input type="file" accept=".csv,.xls,.xlsx" onChange={handleFile} className="hidden" />
                            </label>
                            {error && <p className="text-red-500 text-sm font-bold">{error}</p>}
                        </div>
                    ) : (
                        <div className="space-y-3">
                            <p className="text-sm font-bold text-teal-700">נמצאו {preview.length} תנועות — בדוק לפני ייבוא:</p>
                            <div className="max-h-48 overflow-y-auto space-y-1 border-2 rounded-xl p-3 bg-gray-50">
                                {preview.map((tx, i) => (
                                    <div key={i} className="flex justify-between text-sm py-1 border-b last:border-0">
                                        <span className="text-gray-500">{tx.date}</span>
                                        <span className="flex-1 px-3 text-gray-800">{tx.description}</span>
                                        <span className={`font-bold font-mono ${tx.amount >= 0 ? 'text-green-600' : 'text-red-500'}`}>{formatCurrency(tx.amount)}</span>
                                    </div>
                                ))}
                            </div>
                            <div className="flex gap-3">
                                <button onClick={handleImport} className="flex-1 bg-teal-600 text-white py-3 rounded-xl font-bold hover:bg-teal-700">✅ ייבא {preview.length} תנועות</button>
                                <button onClick={() => setPreview(null)} className="flex-1 bg-gray-100 text-gray-700 py-3 rounded-xl font-bold hover:bg-gray-200">❌ ביטול</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- כרטיסי אשראי ---
        const CreditCardDetail = ({ card, creditTransactions, setCreditTransactions, recurringCredit, setRecurringCredit, banks, viewMonth, onClose }) => {
            const [activeTab, setActiveTab] = useState('charges');
            const [showAddCharge, setShowAddCharge] = useState(false);
            const [showAddRecurring, setShowAddRecurring] = useState(false);
            const [desc, setDesc] = useState('');
            const [amount, setAmount] = useState('');
            const [chargeDate, setChargeDate] = useState(getDateKey(new Date()));
            const [type, setType] = useState('expense');

            const monthKey = `${viewMonth.getFullYear()}-${String(viewMonth.getMonth()+1).padStart(2,'0')}`;
            const cardTxs = creditTransactions.filter(t => t.cardId === card.id && t.date.startsWith(monthKey));
            const cardRecurringTxs = recurringCredit
                .filter(r => r.cardId === card.id)
                .flatMap(r => generateRecurringInstances({ ...r, bankId: card.bankId }))
                .filter(t => t.date.startsWith(monthKey));
            const allCardTxs = [...cardTxs, ...cardRecurringTxs].sort((a,b) => a.date.localeCompare(b.date));
            const total = allCardTxs.reduce((s,t) => s + t.amount, 0);

            const addCharge = () => {
                if (!desc.trim() || !amount) return;
                const finalAmount = type === 'expense' ? -Math.abs(Number(amount)) : Math.abs(Number(amount));
                setCreditTransactions(prev => [...prev, { id: Date.now().toString(), cardId: card.id, date: chargeDate, description: desc.trim(), amount: finalAmount }]);
                setDesc(''); setAmount(''); setShowAddCharge(false);
            };

            return (
                <>
                    <div className="backdrop-animate fixed inset-0 bg-black/40 backdrop-blur-sm z-40" onClick={onClose}></div>
                    <div className="modal-animate fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white rounded-3xl shadow-2xl w-[95%] max-w-lg z-50 overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="bg-indigo-600 p-5 text-white flex justify-between items-center">
                            <div>
                                <h2 className="text-xl font-bold">💳 {card.name}</h2>
                                <p className="text-xs text-indigo-200">{viewMonth.toLocaleDateString('he-IL', { month: 'long', year: 'numeric' })} · חיוב ב-{card.chargeDay}</p>
                            </div>
                            <button onClick={onClose} className="bg-white/20 hover:bg-white/40 w-8 h-8 rounded-full flex items-center justify-center">✕</button>
                        </div>
                        <div className="flex border-b font-bold text-center">
                            {[{id:'charges',label:'📝 חיובים'},{id:'recurring',label:'🔄 קבועים'}].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-1 py-3 text-sm ${activeTab===tab.id ? 'border-b-4 border-indigo-600 text-indigo-600 bg-indigo-50' : 'text-gray-500'}`}>{tab.label}</button>
                            ))}
                        </div>
                        <div className="p-4 overflow-y-auto flex-1">
                            {activeTab === 'charges' && (
                                <div className="space-y-2">
                                    {allCardTxs.length === 0 && !showAddCharge && <div className="text-center py-8 text-gray-400">אין חיובים החודש</div>}
                                    {allCardTxs.map(tx => (
                                        <div key={tx.id} className="flex justify-between items-center p-3 bg-gray-50 rounded-xl border">
                                            <div>
                                                <div className="font-semibold text-gray-800">{tx.description}</div>
                                                <div className="text-xs text-gray-400">{formatDate(tx.date)}{tx.isRecurring ? ' · קבוע' : ''}</div>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <span className={`font-bold font-mono ${tx.amount >= 0 ? 'text-green-600' : 'text-red-500'}`}>{formatCurrency(tx.amount)}</span>
                                                {!tx.isRecurring && <button onClick={() => setCreditTransactions(prev => prev.filter(t => t.id !== tx.id))} className="text-red-400 hover:text-red-600 text-xs">🗑️</button>}
                                            </div>
                                        </div>
                                    ))}
                                    {showAddCharge && (
                                        <div className="bg-indigo-50 rounded-xl p-3 border-2 border-indigo-200 space-y-2">
                                            <div className="flex gap-2">
                                                <button onClick={() => setType('expense')} className={`flex-1 py-2 rounded-lg text-sm font-bold ${type==='expense' ? 'bg-red-500 text-white' : 'bg-white border'}`}>💸 הוצאה</button>
                                                <button onClick={() => setType('income')} className={`flex-1 py-2 rounded-lg text-sm font-bold ${type==='income' ? 'bg-green-500 text-white' : 'bg-white border'}`}>💰 זיכוי</button>
                                            </div>
                                            <input type="text" value={desc} onChange={e => setDesc(e.target.value)} placeholder="תיאור" className="w-full p-2 border rounded-lg text-sm outline-none" />
                                            <input type="number" value={amount} onChange={e => setAmount(e.target.value)} placeholder="סכום" className="w-full p-2 border rounded-lg text-sm font-mono outline-none" />
                                            <input type="date" value={chargeDate} onChange={e => setChargeDate(e.target.value)} className="w-full p-2 border rounded-lg text-sm" />
                                            <div className="flex gap-2">
                                                <button onClick={addCharge} className="flex-1 bg-indigo-600 text-white py-2 rounded-lg text-sm font-bold">✅ הוסף</button>
                                                <button onClick={() => setShowAddCharge(false)} className="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg text-sm font-bold">ביטול</button>
                                            </div>
                                        </div>
                                    )}
                                    {!showAddCharge && <button onClick={() => setShowAddCharge(true)} className="w-full bg-indigo-50 text-indigo-600 py-3 rounded-xl font-bold border-2 border-dashed border-indigo-200 hover:bg-indigo-100">➕ הוסף חיוב</button>}
                                </div>
                            )}
                            {activeTab === 'recurring' && (
                                <div className="space-y-2">
                                    {recurringCredit.filter(r => r.cardId === card.id).length === 0 && !showAddRecurring && <div className="text-center py-8 text-gray-400">אין חיובים קבועים</div>}
                                    {recurringCredit.filter(r => r.cardId === card.id).map(r => (
                                        <div key={r.id} className="flex justify-between items-center p-3 bg-purple-50 rounded-xl border border-purple-100">
                                            <div>
                                                <div className="font-semibold text-gray-800">{r.description}</div>
                                                <div className="text-xs text-gray-400">יום {r.dayOfMonth} · מ-{formatDate(r.startDate)}{r.endDate ? ` עד ${formatDate(r.endDate)}` : ''}</div>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <span className={`font-bold font-mono ${r.amount >= 0 ? 'text-green-600' : 'text-red-500'}`}>{formatCurrency(r.amount)}</span>
                                                <button onClick={() => setRecurringCredit(prev => prev.filter(x => x.id !== r.id))} className="text-red-400 hover:text-red-600 text-xs">🗑️</button>
                                            </div>
                                        </div>
                                    ))}
                                    {showAddRecurring && (
                                        <RecurringCreditForm cardId={card.id} onSave={(data) => { setRecurringCredit(prev => [...prev, { ...data, id: Date.now().toString() }]); setShowAddRecurring(false); }} onCancel={() => setShowAddRecurring(false)} />
                                    )}
                                    {!showAddRecurring && <button onClick={() => setShowAddRecurring(true)} className="w-full bg-purple-50 text-purple-600 py-3 rounded-xl font-bold border-2 border-dashed border-purple-200 hover:bg-purple-100">➕ הוסף קבוע</button>}
                                </div>
                            )}
                        </div>
                        <div className="px-5 py-3 border-t flex justify-between font-black text-lg bg-gray-50">
                            <span>סה"כ חודש:</span>
                            <span className={`font-mono ${total <= 0 ? 'text-red-600' : 'text-green-600'}`}>{formatCurrency(total)}</span>
                        </div>
                    </div>
                </>
            );
        };

        const RecurringCreditForm = ({ cardId, onSave, onCancel }) => {
            const [formData, setFormData] = useState({ description: '', amount: '', type: 'expense', dayOfMonth: 1, startDate: getDateKey(new Date()), endDate: '' });
            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.description.trim() || !formData.amount) return;
                const finalAmount = formData.type === 'expense' ? -Math.abs(Number(formData.amount)) : Math.abs(Number(formData.amount));
                onSave({ cardId, description: formData.description.trim(), amount: finalAmount, type: formData.type, dayOfMonth: Number(formData.dayOfMonth), startDate: formData.startDate, endDate: formData.endDate || null, bankId: 'credit' });
            };
            return (
                <form onSubmit={handleSubmit} className="bg-purple-50 rounded-xl p-3 border-2 border-purple-200 space-y-2">
                    <div className="flex gap-2">
                        <button type="button" onClick={() => setFormData({...formData, type:'income'})} className={`flex-1 py-2 rounded-lg text-sm font-bold ${formData.type==='income' ? 'bg-green-600 text-white' : 'bg-white border'}`}>💰 זיכוי</button>
                        <button type="button" onClick={() => setFormData({...formData, type:'expense'})} className={`flex-1 py-2 rounded-lg text-sm font-bold ${formData.type==='expense' ? 'bg-red-600 text-white' : 'bg-white border'}`}>💸 הוצאה</button>
                    </div>
                    <input type="text" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} placeholder="תיאור (למשל: נטפליקס)" className="w-full p-2 border rounded-lg text-sm outline-none" required />
                    <div className="flex gap-2">
                        <input type="number" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} placeholder="סכום" className="flex-1 p-2 border rounded-lg text-sm font-mono outline-none" required />
                        <input type="number" value={formData.dayOfMonth} onChange={e => setFormData({...formData, dayOfMonth: e.target.value})} placeholder="יום" min="1" max="28" className="w-16 p-2 border rounded-lg text-sm text-center" />
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                        <div><label className="text-xs text-gray-500">מתאריך</label><input type="date" value={formData.startDate} onChange={e => setFormData({...formData, startDate: e.target.value})} className="w-full p-2 border rounded-lg text-sm" /></div>
                        <div><label className="text-xs text-gray-500">עד תאריך</label><input type="date" value={formData.endDate} onChange={e => setFormData({...formData, endDate: e.target.value})} className="w-full p-2 border rounded-lg text-sm" /></div>
                    </div>
                    <div className="flex gap-2">
                        <button type="submit" className="flex-1 bg-purple-600 text-white py-2 rounded-lg text-sm font-bold">✅ שמור</button>
                        <button type="button" onClick={onCancel} className="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg text-sm font-bold">ביטול</button>
                    </div>
                </form>
            );
        };

        const CreditCardsSection = ({ creditCards, setCreditCards, creditTransactions, setCreditTransactions, recurringCredit, setRecurringCredit, banks, currentDate }) => {
            const [openCard, setOpenCard] = useState(null);
            const [showAddCard, setShowAddCard] = useState(false);
            const [newCardName, setNewCardName] = useState('');
            const [newCardBank, setNewCardBank] = useState(banks[0]?.id || '');
            const [newCardDay, setNewCardDay] = useState(10);

            const addCard = () => {
                if (!newCardName.trim()) return;
                setCreditCards(prev => [...prev, { id: Date.now().toString(), name: newCardName.trim(), bankId: newCardBank, chargeDay: Number(newCardDay) }]);
                setNewCardName(''); setShowAddCard(false);
            };

            const getMonthTotal = (cardId) => {
                const monthKey = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}`;
                const txs = creditTransactions.filter(t => t.cardId === cardId && t.date.startsWith(monthKey));
                const recTxs = recurringCredit.filter(r => r.cardId === cardId).flatMap(r => generateRecurringInstances({ ...r, bankId: '' })).filter(t => t.date.startsWith(monthKey));
                return [...txs, ...recTxs].reduce((s,t) => s + t.amount, 0);
            };

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-8 pb-12">
                    <div className="border-t-4 border-gray-100 pt-8">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-2xl font-black text-gray-800 flex items-center gap-2">💳 כרטיסי אשראי</h2>
                            <button onClick={() => setShowAddCard(!showAddCard)} className={`px-5 py-2 rounded-xl font-bold shadow-md transition-all ${showAddCard ? 'bg-gray-500 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>{showAddCard ? '✕ ביטול' : '➕ הוסף כרטיס'}</button>
                        </div>

                        {showAddCard && (
                            <div className="bg-indigo-50 rounded-2xl p-4 border-2 border-indigo-200 mb-6 space-y-3">
                                <h4 className="font-bold text-indigo-800">כרטיס חדש</h4>
                                <input type="text" value={newCardName} onChange={e => setNewCardName(e.target.value)} placeholder="שם הכרטיס (למשל: ישראכרט)" className="w-full p-3 border-2 rounded-xl outline-none focus:border-indigo-400" />
                                <div className="flex gap-3">
                                    <select value={newCardBank} onChange={e => setNewCardBank(e.target.value)} className="flex-1 p-3 border-2 rounded-xl bg-white outline-none">
                                        {banks.map(b => <option key={b.id} value={b.id}>🏦 {b.name}</option>)}
                                    </select>
                                    <div className="flex items-center gap-2 bg-white border-2 rounded-xl px-3">
                                        <span className="text-sm text-gray-500">יום חיוב:</span>
                                        <input type="number" value={newCardDay} onChange={e => setNewCardDay(e.target.value)} min="1" max="28" className="w-12 text-center font-bold outline-none" />
                                    </div>
                                </div>
                                <button onClick={addCard} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700">✅ הוסף כרטיס</button>
                            </div>
                        )}

                        {creditCards.length === 0 && !showAddCard && (
                            <div className="bg-indigo-50 border-2 border-dashed border-indigo-200 rounded-3xl p-10 text-center">
                                <div className="text-5xl mb-4">💳</div>
                                <p className="text-indigo-800 font-bold text-lg">אין כרטיסי אשראי מוגדרים</p>
                            </div>
                        )}

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                            {creditCards.map(card => {
                                const total = getMonthTotal(card.id);
                                const bankName = banks.find(b => b.id === card.bankId)?.name || '';
                                return (
                                    <div key={card.id} onClick={() => setOpenCard(card)} className="bg-white rounded-2xl p-5 shadow-md border-2 border-gray-100 hover:border-indigo-300 cursor-pointer transition-all hover:-translate-y-1">
                                        <div className="flex justify-between items-start mb-3">
                                            <div>
                                                <h3 className="font-black text-gray-800 text-lg">💳 {card.name}</h3>
                                                <p className="text-xs text-gray-400">{bankName} · חיוב ב-{card.chargeDay}</p>
                                            </div>
                                            <button onClick={e => { 
                                                e.stopPropagation(); 
                                                if(confirm(`למחוק את ${card.name}?\nחיובים שכבר עברו תאריך החיוב יישארו בהיסטוריה.`)) {
                                                    const today = getDateKey(new Date());
                                                    // מחק רק חיובים ידניים עתידיים
                                                    setCreditTransactions(prev => prev.filter(t => !(t.cardId === card.id && t.date > today)));
                                                    // מחק תנועות קבועות (כולן, כי הן מחושבות דינמית)
                                                    setRecurringCredit(prev => prev.filter(r => r.cardId !== card.id));
                                                    // מחק את הכרטיס
                                                    setCreditCards(prev => prev.filter(c => c.id !== card.id));
                                                }
                                            }} className="text-red-400 hover:text-red-600">🗑️</button>
                                        </div>
                                        <div className="bg-indigo-50 rounded-xl p-3 text-center">
                                            <div className="text-xs text-gray-400 mb-1">{currentDate.toLocaleDateString('he-IL', { month: 'long', year: 'numeric' })}</div>
                                            <div className={`text-xl font-black ${total < 0 ? 'text-red-600' : 'text-green-600'}`}>{formatCurrency(total)}</div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {openCard && (
                        <CreditCardDetail
                            card={openCard}
                            creditTransactions={creditTransactions}
                            setCreditTransactions={setCreditTransactions}
                            recurringCredit={recurringCredit}
                            setRecurringCredit={setRecurringCredit}
                            banks={banks}
                            viewMonth={currentDate}
                            onClose={() => setOpenCard(null)}
                        />
                    )}
                </div>
            );
        };

        // --- מחשבון ---
        const Calculator = ({ onClose }) => {
            const [display, setDisplay] = useState('0');
            const [expression, setExpression] = useState('');
            const [justCalculated, setJustCalculated] = useState(false);

            const handleNumber = (num) => {
                if (justCalculated) { setDisplay(num); setExpression(''); setJustCalculated(false); return; }
                setDisplay(prev => prev === '0' ? num : prev + num);
            };

            const handleOperator = (op) => {
                setJustCalculated(false);
                setExpression(display + ' ' + op + ' ');
                setDisplay('0');
            };

            const handleDecimal = () => {
                if (justCalculated) { setDisplay('0.'); setExpression(''); setJustCalculated(false); return; }
                if (!display.includes('.')) setDisplay(prev => prev + '.');
            };

            const handleEquals = () => {
                try {
                    const fullExpr = expression + display;
                    const result = Function('"use strict"; return (' + fullExpr.replace(/×/g,'*').replace(/÷/g,'/') + ')')();
                    const rounded = Math.round(result * 100) / 100;
                    setDisplay(String(rounded));
                    setExpression(fullExpr + ' =');
                    setJustCalculated(true);
                } catch { setDisplay('שגיאה'); setExpression(''); }
            };

            const handleClear = () => { setDisplay('0'); setExpression(''); setJustCalculated(false); };
            const handleBackspace = () => { if (justCalculated) return; setDisplay(prev => prev.length > 1 ? prev.slice(0,-1) : '0'); };

            const btn = (label, onClick, cls='') => (
                <button onClick={onClick} className={`rounded-2xl py-4 text-lg font-bold transition-all active:scale-95 ${cls}`}>{label}</button>
            );

            return (
                <div className="fixed bottom-24 left-1/2 -translate-x-1/2 z-50 bg-white rounded-3xl shadow-2xl border-2 border-gray-100 overflow-hidden w-72">
                    <div className="bg-gray-800 p-4 text-right">
                        <div className="text-gray-400 text-xs h-4">{expression}</div>
                        <div className="text-white text-3xl font-mono font-bold truncate">{display}</div>
                    </div>
                    <div className="grid grid-cols-4 gap-2 p-3">
                        {btn('C', handleClear, 'bg-red-100 text-red-600 hover:bg-red-200')}
                        {btn('⌫', handleBackspace, 'bg-gray-100 text-gray-600 hover:bg-gray-200')}
                        {btn('%', () => setDisplay(String(parseFloat(display)/100)), 'bg-gray-100 text-gray-600 hover:bg-gray-200')}
                        {btn('÷', () => handleOperator('÷'), 'bg-blue-100 text-blue-600 hover:bg-blue-200')}
                        {btn('7', () => handleNumber('7'), 'bg-gray-50 hover:bg-gray-100')}
                        {btn('8', () => handleNumber('8'), 'bg-gray-50 hover:bg-gray-100')}
                        {btn('9', () => handleNumber('9'), 'bg-gray-50 hover:bg-gray-100')}
                        {btn('×', () => handleOperator('×'), 'bg-blue-100 text-blue-600 hover:bg-blue-200')}
                        {btn('4', () => handleNumber('4'), 'bg-gray-50 hover:bg-gray-100')}
                        {btn('5', () => handleNumber('5'), 'bg-gray-50 hover:bg-gray-100')}
                        {btn('6', () => handleNumber('6'), 'bg-gray-50 hover:bg-gray-100')}
                        {btn('−', () => handleOperator('-'), 'bg-blue-100 text-blue-600 hover:bg-blue-200')}
                        {btn('1', () => handleNumber('1'), 'bg-gray-50 hover:bg-gray-100')}
                        {btn('2', () => handleNumber('2'), 'bg-gray-50 hover:bg-gray-100')}
                        {btn('3', () => handleNumber('3'), 'bg-gray-50 hover:bg-gray-100')}
                        {btn('+', () => handleOperator('+'), 'bg-blue-100 text-blue-600 hover:bg-blue-200')}
                        {btn('0', () => handleNumber('0'), 'bg-gray-50 hover:bg-gray-100 col-span-2')}
                        {btn('.', handleDecimal, 'bg-gray-50 hover:bg-gray-100')}
                        {btn('=', handleEquals, 'bg-blue-600 text-white hover:bg-blue-700')}
                    </div>
                    <button onClick={onClose} className="w-full py-2 text-xs text-gray-400 hover:text-gray-600 border-t">סגור</button>
                </div>
            );
        };

        // --- חיפוש גלובלי ---
        const GlobalSearchModal = ({ transactions, banks, onClose, onSelectDate }) => {
            const [query, setQuery] = useState('');
            const inputRef = React.useRef(null);

            useEffect(() => { inputRef.current?.focus(); }, []);

            const results = useMemo(() => {
                if (!query.trim()) return [];
                const q = query.trim().toLowerCase();
                return transactions
                    .filter(t => t.description?.toLowerCase().includes(q) || Math.abs(t.amount).toString().includes(q))
                    .sort((a, b) => b.date.localeCompare(a.date));
            }, [query, transactions]);

            return (
                <>
                    <div className="backdrop-animate fixed inset-0 bg-black/40 backdrop-blur-sm z-40" onClick={onClose}></div>
                    <div className="modal-animate fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white rounded-3xl shadow-2xl w-[95%] max-w-lg z-50 overflow-hidden flex flex-col max-h-[85vh]">
                        <div className="bg-blue-600 p-4 text-white flex items-center gap-3">
                            <span className="text-xl">🔍</span>
                            <input
                                ref={inputRef}
                                type="text"
                                value={query}
                                onChange={e => setQuery(e.target.value)}
                                placeholder="חפש בכל התנועות..."
                                className="flex-1 bg-white/20 placeholder-white/70 text-white outline-none rounded-xl px-3 py-2 text-sm"
                            />
                            <button onClick={onClose} className="bg-white/20 hover:bg-white/40 w-8 h-8 rounded-full flex items-center justify-center">✕</button>
                        </div>
                        <div className="p-4 overflow-y-auto">
                            {!query.trim() && <div className="text-center py-10 text-gray-400">הקלד כדי לחפש בכל התנועות</div>}
                            {query.trim() && results.length === 0 && <div className="text-center py-10 text-gray-400">לא נמצאו תנועות</div>}
                            {results.map(tx => (
                                <div key={tx.id} onClick={() => onSelectDate(tx.date)} className="flex justify-between items-center p-3 rounded-xl border mb-2 hover:bg-blue-50 cursor-pointer transition-colors">
                                    <div>
                                        <div className="font-semibold text-gray-800">{tx.description}</div>
                                        <div className="text-xs text-gray-400">{formatDate(tx.date)} · {banks.find(b => b.id === tx.bankId)?.name}</div>
                                    </div>
                                    <span className={`font-bold font-mono ${tx.amount >= 0 ? 'text-green-600' : 'text-red-500'}`}>{formatCurrency(tx.amount)}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </>
            );
        };

        // --- רכיב האפליקציה המקורי ---
        const FinanceApp = ({ currentUser, onLogout }) => {
            const prefix = `finance_${currentUser}_`;
            const defaultBanks = [{ id: '1', name: 'חשבון עו"ש', color: '#3b82f6', initialBalance: 0 }];
            // טעינה מ-localStorage רק אם הנתונים שייכים למשתמש הנוכחי
            const [banks, setBanks] = useState(() => {
                const saved = localStorage.getItem(prefix + 'banks');
                return saved ? JSON.parse(saved) : defaultBanks;
            });
            const [transactions, setTransactions] = useState(() => {
                const saved = localStorage.getItem(prefix + 'transactions');
                return saved ? JSON.parse(saved) : [];
            });
            const [recurringTransactions, setRecurringTransactions] = useState(() => {
                const saved = localStorage.getItem(prefix + 'recurring');
                return saved ? JSON.parse(saved) : [];
            });
            const [creditCards, setCreditCards] = useState(() => {
                const saved = localStorage.getItem(prefix + 'creditCards');
                return saved ? JSON.parse(saved) : [];
            });
            const [creditTransactions, setCreditTransactions] = useState(() => {
                const saved = localStorage.getItem(prefix + 'creditTransactions');
                return saved ? JSON.parse(saved) : [];
            });
            const [recurringCredit, setRecurringCredit] = useState(() => {
                const saved = localStorage.getItem(prefix + 'recurringCredit');
                return saved ? JSON.parse(saved) : [];
            });
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(null);
            const [showAddRecurring, setShowAddRecurring] = useState(false);
            const [selectedBankFilter, setSelectedBankFilter] = useState('all');
            const [usdRate, setUsdRate] = useState(null);
            const [usdUpdateTime, setUsdUpdateTime] = useState(null);
            const [touchStart, setTouchStart] = useState(null);
            const [touchEnd, setTouchEnd] = useState(null);
            const [showPwaInstall, setShowPwaInstall] = useState(false);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [showPending, setShowPending] = useState(true);
            const [showGlobalSearch, setShowGlobalSearch] = useState(false);
            const [showCalculator, setShowCalculator] = useState(false);
            const [undoToast, setUndoToast] = useState(null);

            const showUndo = (label, txsToRestore) => {
                if (undoToast?.timer) clearTimeout(undoToast.timer);
                const timer = setTimeout(() => setUndoToast(null), 5000);
                setUndoToast({ label, txsToRestore, timer });
            };

            const handleUndo = () => {
